name: 股票信息日报推送

on:
  schedule:
    # 每天北京时间8:30运行（UTC 0:30）
    - cron: '30 0 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]

jobs:
  generate-daily-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装TA-LIB依赖
        sudo apt-get update
        sudo apt-get install -y libta-lib-dev
        pip install TA-Lib
        
    - name: 生成日报
      env:
        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
      run: |
        python daily_report.py
        
    - name: 上传报告文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stock-reports
        path: |
          reports/
          data/
          images/
        retention-days: 7
        
  generate-weekly-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y libta-lib-dev
        pip install TA-Lib
        
    - name: 生成周报
      env:
        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
      run: |
        python weekly_report.py
        
    - name: 上传报告文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: weekly-reports
        path: |
          reports/
          data/
          images/
        retention-days: 7
